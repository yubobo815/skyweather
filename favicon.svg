<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Skyweather app icon</title>
  <desc id="desc">A modern weather app icon with a sun, cloud, rain drops, and a teal sky arc.</desc>
  <defs>
